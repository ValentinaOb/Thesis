<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>File Archiving</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; text-align: center; }
    form { margin-top: 20px; }
    #result { margin-top: 30px; font-weight: bold; }
    button { padding: 8px 20px; border: none; background: #0078ff; color: white; border-radius: 5px; cursor: pointer; }
    button:hover { background: #005fcc; }
  </style>
</head>
<body>
  <h2>>Upload files for archiving</h2>
  <form id="uploadForm" enctype="multipart/form-data">
    <input type="file" name="files" id="files" multiple>
    <button type="submit">>Archive</button>
  </form>

  <div id="result"></div>

  <script>
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const files = document.getElementById('files').files;
      if (!files.length) {
        document.getElementById('result').innerHTML = 'No files selected';
        return;
      }

      const formData = new FormData();
      for (let f of files) formData.append('files', f);

      const response = await fetch('/upload', { method: 'POST', body: formData });
      const html = await response.text();
      document.getElementById('result').innerHTML = html;
    });
  </script>
</body>
</html>
