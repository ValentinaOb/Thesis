global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "node-app"
    static_configs:
      - targets: ["node-app:3000"]

  - job_name: "python-app"
    static_configs:
      - targets: ["python-app:8000"]